apiVersion: apps/v1
kind: Deployment
metadata:
  name: p2p-chat
  namespace: p2p-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: p2p-chat
  template:
    metadata:
      labels:
        app: p2p-chat
    spec:
      containers:
        - name: p2p-chat
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 17001
              name: web
            - containerPort: 9001
              name: p2p
          envFrom:
            - configMapRef:
                name: p2p-chat-config
          command: ["python", "main.py"]
          args:
            - "--host"
            - "$(UI_HOST)"
            - "--port"
            - "$(APP_PORT)"
            - "--ui-port"
            - "$(UI_PORT)"
            - "--username"
            - "$(APP_USERNAME)"
          readinessProbe:
            httpGet:
              path: /
              port: 17001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 17001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
