apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: p2p-chat-hpa
  namespace: p2p-chat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: p2p-chat
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
