name: ci-cd

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static syntax check
        run: |
          python -m py_compile main.py peer.py ui.py message_store.py encryption.py

      - name: Runtime smoke test (2-peer integration)
        run: |
          PYTHONPATH=. python eval/smoke_p2p.py

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/p2p-chat:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/p2p-chat:latest

  deploy-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Create ACR pull secret
        run: |
          kubectl create namespace p2p-chat --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry acr-secret \
            --namespace p2p-chat \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=${{ secrets.ACR_NAME }} \
            --docker-password=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query "passwords[0].value" -o tsv) \
            --docker-email=dummy@example.com \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: |
          sed -e "s|\${ACR_LOGIN_SERVER}|$ACR_LOGIN_SERVER|g" -e "s|\${GITHUB_SHA}|$GITHUB_SHA|g" k8s/deployment.yaml > /tmp/deployment.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f /tmp/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Debug Kubernetes rollout
        run: |
          kubectl get pods -n p2p-chat -o wide
          kubectl describe deployment p2p-chat -n p2p-chat
          kubectl describe pods -n p2p-chat
          kubectl get events -n p2p-chat --sort-by=.metadata.creationTimestamp

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/p2p-chat -n p2p-chat --timeout=180s
          kubectl get pods -n p2p-chat -o wide
          kubectl get svc -n p2p-chat
